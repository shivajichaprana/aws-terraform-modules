name: Terraform Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  validate:
    name: Validate Modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [vpc, s3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init — ${{ matrix.module }}
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}

      - name: Terraform Validate — ${{ matrix.module }}
        run: terraform validate
        working-directory: modules/${{ matrix.module }}

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [vpc, s3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.53.0"

      - name: Init TFLint
        run: tflint --init
        working-directory: modules/${{ matrix.module }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint — ${{ matrix.module }}
        run: tflint --format=compact
        working-directory: modules/${{ matrix.module }}

  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    needs: [format-check, validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init — Full Stack Example
        run: terraform init -backend=false
        working-directory: examples/full-stack

      - name: Terraform Validate — Full Stack Example
        run: terraform validate
        working-directory: examples/full-stack
